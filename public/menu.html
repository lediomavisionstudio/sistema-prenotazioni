<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c8402a" />
  <meta name="description" content="Menu digitale del locale." />
  <title>Menu Digitale</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Menu" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --paper: #efe4c9;
      --surface: #fffdf6;
      --surface-soft: #f7efdb;
      --ink: #3a2b23;
      --ink-soft: #7a6a5d;
      --tomato: #c8402a;
      --tomato-dark: #a5321f;
      --tomato-soft: #f7ddd5;
      --line: #e3d6ba;
      --ok: #2f7d55;
      --radius: 22px;
      --shadow: 0 20px 70px rgba(58, 43, 35, .14);
      --font-title: "Bricolage Grotesque", system-ui, sans-serif;
      --font-body: "Inter", system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }
    [hidden] { display: none !important; }
    button, input { font: inherit; }

    .menu-page {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px 14px 40px;
    }
    .menu-cover {
      position: relative;
      min-height: 260px;
      display: grid;
      align-items: end;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(200,64,42,.15), transparent 56%),
        linear-gradient(180deg, rgba(255,253,246,.78), rgba(247,239,219,.88)),
        var(--surface-soft);
      box-shadow: var(--shadow);
    }
    .menu-cover::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--cover-image);
      background-size: cover;
      background-position: center;
      opacity: .22;
      filter: saturate(.94);
    }
    .menu-cover__content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
      padding: clamp(22px, 5vw, 42px);
    }
    .menu-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }
    .brand-logo {
      width: 58px;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      object-fit: contain;
      padding: 4px;
      box-shadow: 0 10px 26px rgba(58,43,35,.1);
    }
    .brand-logo[hidden] { display: none; }
    .brand-kicker {
      margin: 0 0 3px;
      color: var(--tomato-dark);
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .brand-name {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(1.75rem, 7vw, 3.25rem);
      line-height: .96;
      letter-spacing: -.02em;
    }
    .brand-sub {
      margin: 8px 0 0;
      color: var(--ink-soft);
      font-size: .95rem;
    }
    .lang-switch {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,253,246,.72);
    }
    .lang-switch button {
      min-width: 76px;
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--ink-soft);
      font-weight: 800;
      cursor: pointer;
      transition: background .2s ease, color .2s ease, transform .12s ease;
    }
    .lang-switch button.is-active {
      background: var(--tomato);
      color: #fff;
      box-shadow: 0 10px 20px rgba(200,64,42,.16);
    }
    .lang-switch button:focus-visible,
    .category-chip:focus-visible,
    .home-link:focus-visible,
    .search-box:focus-within {
      outline: 2px solid var(--tomato);
      outline-offset: 3px;
    }
    .menu-tools {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin: 18px 0 0;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,253,246,.82);
      box-shadow: 0 12px 28px rgba(58,43,35,.08);
    }
    .search-box span {
      color: var(--tomato-dark);
      font-weight: 900;
      font-size: 0;
    }
    .search-box span::before {
      content: "\2315";
      font-size: .95rem;
    }
    .search-box input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      font-size: .98rem;
    }
    .home-link {
      min-height: 54px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      color: var(--tomato-dark);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
      transition: transform .2s ease, border-color .2s ease, box-shadow .2s ease;
    }
    .home-link:hover {
      transform: translateY(-1px);
      border-color: rgba(200,64,42,.42);
      box-shadow: 0 12px 28px rgba(58,43,35,.08);
    }
    .category-strip-wrap {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: 16px -14px 0;
      padding: 10px 14px;
      background: rgba(239, 228, 201, .92);
      background: color-mix(in srgb, var(--paper) 86%, transparent);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(227,214,186,.68);
    }
    .category-strip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .category-strip::-webkit-scrollbar { display: none; }
    .category-chip {
      flex: 0 0 auto;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink-soft);
      font-weight: 800;
      padding: 0 14px;
      cursor: pointer;
      transition: background .2s ease, border-color .2s ease, color .2s ease;
    }
    .category-chip.is-active {
      background: var(--tomato);
      border-color: var(--tomato);
      color: #fff;
    }
    .menu-content {
      display: grid;
      gap: 28px;
      padding: 28px 0 0;
    }
    .menu-section {
      scroll-margin-top: 76px;
      animation: sectionIn .28s ease both;
    }
    .menu-section__head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .menu-section__title {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(1.35rem, 4vw, 2rem);
      line-height: 1;
    }
    .menu-section__count {
      color: var(--ink-soft);
      font-size: .85rem;
      font-weight: 800;
    }
    .items-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    .dish-card {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 14px;
      min-height: 154px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--surface);
      box-shadow: 0 14px 36px rgba(58,43,35,.08);
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      overflow: hidden;
    }
    .dish-card:hover {
      transform: translateY(-2px);
      border-color: rgba(200,64,42,.4);
      box-shadow: 0 20px 48px rgba(58,43,35,.12);
    }
    .dish-media {
      position: relative;
      min-height: 130px;
      border-radius: 18px;
      overflow: hidden;
      background:
        linear-gradient(135deg, var(--tomato-soft), var(--surface-soft));
    }
    .dish-media img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .dish-placeholder {
      height: 100%;
      min-height: 130px;
      display: grid;
      place-items: center;
      color: var(--tomato-dark);
      font-family: var(--font-title);
      font-size: 2rem;
      font-weight: 800;
    }
    .dish-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .dish-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .dish-title {
      margin: 0;
      font-family: var(--font-title);
      font-size: 1.15rem;
      line-height: 1.08;
    }
    .dish-price {
      color: var(--tomato-dark);
      font-weight: 900;
      white-space: nowrap;
    }
    .dish-description {
      margin: 0;
      color: var(--ink-soft);
      font-size: .9rem;
      line-height: 1.45;
    }
    .dish-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: auto;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      padding: 4px 8px;
      border: 1px solid transparent;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 900;
      line-height: 1;
    }
    .badge--ok { color: #226747; background: #ddf7e9; border-color: #aee7c7; }
    .badge--off { color: #7a4b42; background: #f4e5df; border-color: #e4c4ba; }
    .badge--new { color: #94530d; background: #fff1d7; border-color: #f5c983; }
    .badge--featured { color: var(--tomato-dark); background: var(--tomato-soft); border-color: rgba(200,64,42,.28); }
    .state {
      padding: 48px 18px;
      text-align: center;
      color: var(--ink-soft);
    }
    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 14px;
      border: 4px solid rgba(227,214,186,.7);
      border-top-color: var(--tomato);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    .skeleton {
      display: grid;
      gap: 14px;
      padding: 28px 0 0;
    }
    .skeleton-row {
      min-height: 150px;
      border-radius: 22px;
      background: linear-gradient(90deg, rgba(255,253,246,.65), rgba(247,239,219,.9), rgba(255,253,246,.65));
      background-size: 220% 100%;
      animation: shimmer 1.2s ease-in-out infinite;
    }
    .empty-card {
      padding: 34px 18px;
      border: 1px dashed var(--line);
      border-radius: 22px;
      background: var(--surface);
      color: var(--ink-soft);
      text-align: center;
    }
    .install-modal {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      place-items: end center;
      padding: 18px;
      background: rgba(58,43,35,.26);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
    }
    .install-modal.is-visible {
      opacity: 1;
      pointer-events: auto;
    }
    .install-card {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 24px 80px rgba(58,43,35,.24);
      padding: 20px;
      transform: translateY(14px) scale(.98);
      transition: transform .22s ease;
    }
    .install-modal.is-visible .install-card {
      transform: translateY(0) scale(1);
    }
    .install-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      margin-bottom: 12px;
      border-radius: 15px;
      background: var(--tomato-soft);
      color: var(--tomato-dark);
    }
    .install-icon svg {
      width: 26px;
      height: 26px;
      display: block;
    }
    .install-title {
      margin: 0;
      font-family: var(--font-title);
      font-size: 1.38rem;
      line-height: 1.05;
    }
    .install-text {
      margin: 10px 0 0;
      color: var(--ink-soft);
      line-height: 1.5;
      font-size: .93rem;
    }
    .install-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .install-btn {
      min-height: 46px;
      flex: 1;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 900;
      cursor: pointer;
      transition: background .2s ease, transform .16s ease, border-color .2s ease;
    }
    .install-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(200,64,42,.36);
    }
    .install-btn--primary {
      border-color: var(--tomato);
      background: var(--tomato);
      color: #fff;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { to { background-position: -220% 0; } }
    @keyframes sectionIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
    @media (max-width: 900px) {
      .items-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .menu-page { padding-inline: 10px; }
      .menu-cover { border-radius: 24px; min-height: 230px; }
      .menu-tools { grid-template-columns: 1fr; }
      .home-link { width: 100%; }
      .dish-card { grid-template-columns: 104px minmax(0, 1fr); border-radius: 18px; }
      .dish-media, .dish-placeholder { min-height: 110px; }
      .brand-logo { width: 48px; height: 48px; border-radius: 14px; }
    }
    @media (max-width: 430px) {
      .dish-card { grid-template-columns: 1fr; }
      .dish-media, .dish-placeholder { min-height: 190px; }
      .dish-title-row { align-items: flex-start; }
      .install-modal { place-items: end center; padding: 12px; }
      .install-card { border-radius: 22px; padding: 18px; }
      .install-actions { flex-direction: column; }
    }
  </style>
</head>
<body>
  <main class="menu-page">
    <section class="menu-cover" id="menuCover">
      <div class="menu-cover__content">
        <div class="menu-topline">
          <div class="brand-lockup">
            <img class="brand-logo" id="venueLogo" alt="" hidden />
            <div>
              <p class="brand-kicker">Menu digitale</p>
              <h1 class="brand-name" id="venueName">Menu</h1>
            </div>
          </div>
          <div class="lang-switch" role="group" aria-label="Lingua menu">
            <button type="button" class="is-active" id="langIt" data-lang="it">Italiano</button>
            <button type="button" id="langEn" data-lang="en">English</button>
          </div>
        </div>
        <p class="brand-sub" id="venueSub"></p>
        <div class="menu-tools">
          <label class="search-box">
            <span aria-hidden="true">⌕</span>
            <input id="menuSearch" type="search" placeholder="Cerca nel menu" autocomplete="off" />
          </label>
          <a class="home-link" id="bookingLink" href="index.html">Torna in Home</a>
        </div>
      </div>
    </section>

    <div class="category-strip-wrap" id="categoryWrap" hidden>
      <nav class="category-strip" id="categoryStrip" aria-label="Categorie menu"></nav>
    </div>

    <section class="skeleton" id="skeleton" aria-label="Caricamento menu">
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
      <div class="skeleton-row"></div>
    </section>

    <section class="menu-content" id="menuContent" hidden></section>

    <section class="state" id="fatalState" hidden>
      <p id="fatalText">Menu non disponibile.</p>
      <a class="home-link" id="fatalHomeLink" href="index.html">Torna in Home</a>
    </section>
  </main>

  <script src="/assets/js/config.js"></script>
  <script type="module" src="/assets/js/digital-menu.js"></script>
</body>
</html>
