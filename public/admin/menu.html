<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c8402a" />
  <title>Menu - Pannello gestionale</title>
  <script>
    (() => {
      const embedded = new URLSearchParams(window.location.search).get('embed') === '1';
      window.ADMIN_EMBED = embedded;
      if (embedded) {
        document.documentElement.classList.add('is-admin-embed');
      } else {
        window.location.replace('settings.html?tab=menu');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../assets/js/admin-theme.js"></script>
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/panel.css" />
  <style>
    .menu-shell {
      display: grid;
      gap: 18px;
    }
    .menu-hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--surface) 86%, transparent), color-mix(in srgb, var(--surface-soft) 88%, transparent)),
        var(--surface);
      box-shadow: var(--shadow);
    }
    .menu-hero__eyebrow,
    .menu-panel__eyebrow {
      margin: 0 0 6px;
      color: var(--tomato);
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .menu-hero__title {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(1.7rem, 4vw, 2.45rem);
      line-height: 1.02;
    }
    .menu-hero__text {
      max-width: 680px;
      margin: 10px 0 0;
      color: var(--ink-soft);
      font-size: .95rem;
    }
    .menu-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .menu-editor-grid {
      display: grid;
      grid-template-columns: minmax(280px, .8fr) minmax(0, 1.8fr);
      gap: 18px;
      align-items: start;
    }
    .menu-panel {
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .menu-panel__head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }
    .menu-panel__title {
      margin: 0;
      font-family: var(--font-title);
      font-size: 1.1rem;
      line-height: 1.1;
    }
    .menu-panel__body {
      padding: 16px;
    }
    .category-create {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    .category-create__row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    .category-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .category-preset {
      min-height: 34px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink);
      font: inherit;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease, transform .12s ease;
    }
    .category-preset:hover {
      border-color: var(--tomato);
      background: var(--tomato-soft);
    }
    .category-list,
    .items-list {
      display: grid;
      gap: 10px;
    }
    .category-card {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface-soft);
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .category-card.is-selected {
      border-color: var(--tomato);
      box-shadow: 0 12px 28px color-mix(in srgb, var(--tomato) 16%, transparent);
    }
    .category-card.is-dragging,
    .menu-item-card.is-dragging {
      opacity: .54;
      transform: scale(.985);
    }
    .category-card.is-drop-target,
    .items-list.is-drop-target,
    .menu-item-card.is-drop-target {
      outline: 2px dashed var(--tomato);
      outline-offset: 4px;
    }
    .category-card__top {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }
    .drag-handle {
      display: inline-grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface);
      color: var(--ink-soft);
      cursor: grab;
      user-select: none;
    }
    .category-input,
    .menu-input,
    .menu-textarea,
    .menu-select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      padding: 11px 12px;
    }
    .category-input:focus,
    .menu-input:focus,
    .menu-textarea:focus,
    .menu-select:focus {
      outline: none;
      border-color: var(--tomato);
      box-shadow: 0 0 0 3px var(--tomato-soft);
    }
    .menu-textarea {
      resize: vertical;
      min-height: 82px;
    }
    .category-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--ink-soft);
      font-size: .78rem;
    }
    .menu-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--ink-soft);
      font-size: .82rem;
      font-weight: 700;
    }
    .menu-switch input {
      width: 18px;
      height: 18px;
      accent-color: var(--tomato);
    }
    .category-actions,
    .item-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .menu-button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      color: var(--ink);
      font: inherit;
      font-size: .82rem;
      font-weight: 800;
      padding: 8px 11px;
      cursor: pointer;
      transition: background .18s ease, border-color .18s ease, transform .12s ease;
    }
    .menu-button:hover:not(:disabled) {
      border-color: var(--tomato);
      background: var(--tomato-soft);
    }
    .menu-button:focus-visible,
    .category-preset:focus-visible,
    .item-image-drop:focus-visible {
      outline: 2px solid var(--tomato);
      outline-offset: 3px;
    }
    .menu-button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .menu-button--danger {
      color: var(--tomato);
    }
    .items-empty,
    .menu-empty {
      padding: 22px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: var(--surface-soft);
      color: var(--ink-soft);
      text-align: center;
    }
    .menu-item-card {
      display: grid;
      grid-template-columns: 138px minmax(0, 1fr);
      gap: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface-soft);
      transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .item-image-drop {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 138px;
      aspect-ratio: 1 / 1;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: var(--surface);
      overflow: hidden;
      cursor: pointer;
      text-align: center;
      color: var(--ink-soft);
      font-size: .82rem;
      font-weight: 700;
    }
    .item-image-drop.is-over {
      border-color: var(--tomato);
      background: var(--tomato-soft);
    }
    .item-image-drop img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .item-image-drop span {
      position: relative;
      z-index: 1;
      padding: 10px;
    }
    .menu-item-form {
      display: grid;
      gap: 12px;
    }
    .item-form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .menu-field {
      display: grid;
      gap: 5px;
    }
    .menu-field > span {
      color: var(--ink-soft);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .02em;
    }
    .item-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .autosave-indicator {
      min-height: 24px;
      color: var(--ink-soft);
      font-size: .78rem;
      font-weight: 700;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    @media (max-width: 1100px) {
      .menu-editor-grid {
        grid-template-columns: 1fr;
      }
      .settings-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    @media (max-width: 760px) {
      .menu-hero,
      .menu-panel__head {
        flex-direction: column;
      }
      .menu-toolbar,
      .category-actions,
      .item-actions {
        width: 100%;
      }
      .menu-toolbar .btn,
      .menu-button,
      .category-create__row {
        width: 100%;
      }
      .category-create__row,
      .menu-item-card,
      .item-form-grid,
      .settings-grid {
        grid-template-columns: 1fr;
      }
      .item-image-drop {
        width: 100%;
        max-width: 220px;
      }
    }

    .is-admin-embed,
    .is-admin-embed body {
      background: transparent;
    }

    .is-admin-embed .topbar {
      display: none;
    }

    .is-admin-embed .page {
      width: 100%;
      max-width: none;
      padding: 0;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__brand">
        <img class="topbar__logo" id="venueLogo" alt="" hidden />
        <span class="topbar__brand-text">
          <span class="topbar__venue" id="venueName">-</span>
          <span class="topbar__role" id="userRole"></span>
        </span>
      </div>
      <input class="topbar__toggle" id="adminNavToggle" type="checkbox" aria-label="Apri menu" />
      <label class="topbar__menu" for="adminNavToggle" aria-hidden="true"><span></span><span></span><span></span></label>
      <nav class="topbar__nav" aria-label="Navigazione gestionale">
        <div class="topbar__nav-head">
          <div>
            <span class="topbar__nav-title"></span>
            <span class="topbar__nav-role"></span>
          </div>
          <label class="topbar__nav-close" for="adminNavToggle" role="button" tabindex="0" aria-label="Chiudi menu"><span></span></label>
        </div>
        <a class="topbar__link" href="dashboard.html">Dashboard</a>
        <a class="topbar__link" href="upcoming.html">Prenotazioni</a>
        <a class="topbar__link" href="stats.html">Statistiche</a>
        <a class="topbar__link is-active" href="settings.html?tab=menu">Impostazioni</a>
        <button class="btn btn--ghost btn--sm" id="logoutBtn" type="button">Esci</button>
      </nav>
      <label class="topbar__scrim" for="adminNavToggle" aria-hidden="true"></label>
    </div>
  </header>

  <main class="page" id="page" hidden>
    <section class="menu-shell" aria-labelledby="menuPageTitle">
      <div class="menu-hero">
        <div>
          <p class="menu-hero__eyebrow">Menu digitale</p>
          <h1 class="menu-hero__title" id="menuPageTitle">Editor menu</h1>
          <p class="menu-hero__text">Crea categorie, piatti, traduzioni e immagini. Ogni modifica viene salvata automaticamente.</p>
        </div>
        <div class="menu-toolbar">
          <button class="btn btn--primary" id="addCategoryTop" type="button">+ Categoria</button>
          <button class="btn btn--ghost" id="addItemTop" type="button">+ Piatto</button>
        </div>
      </div>

      <section class="menu-panel" aria-labelledby="settingsTitle">
        <div class="menu-panel__head">
          <div>
            <p class="menu-panel__eyebrow">Configurazione</p>
            <h2 class="menu-panel__title" id="settingsTitle">Impostazioni menu</h2>
          </div>
          <span class="autosave-indicator" id="saveState">Salvataggio automatico attivo</span>
        </div>
        <div class="menu-panel__body">
          <div class="settings-grid" id="settingsForm">
            <label class="menu-field">
              <span>Lingua principale</span>
              <select class="menu-select" id="defaultLanguage">
                <option value="it">Italiano</option>
                <option value="en">Inglese</option>
              </select>
            </label>
            <label class="menu-field">
              <span>Seconda lingua</span>
              <select class="menu-select" id="secondaryLanguage">
                <option value="en">Inglese</option>
                <option value="it">Italiano</option>
                <option value="">Nessuna</option>
              </select>
            </label>
            <label class="menu-field">
              <span>Valuta</span>
              <input class="menu-input" id="currency" maxlength="3" value="EUR" />
            </label>
            <label class="menu-switch">
              <input id="showPrices" type="checkbox" checked />
              Mostra prezzi
            </label>
            <label class="menu-switch">
              <input id="showImages" type="checkbox" checked />
              Mostra immagini
            </label>
          </div>
        </div>
      </section>

      <div class="menu-editor-grid">
        <section class="menu-panel" aria-labelledby="categoriesTitle">
          <div class="menu-panel__head">
            <div>
              <p class="menu-panel__eyebrow">Organizzazione</p>
              <h2 class="menu-panel__title" id="categoriesTitle">Categorie</h2>
            </div>
          </div>
          <div class="menu-panel__body">
            <div class="category-create">
              <div class="category-create__row">
                <input class="menu-input" id="newCategoryName" type="text" placeholder="Nome categoria" />
                <button class="menu-button" id="addCategoryBtn" type="button">Aggiungi</button>
              </div>
              <div class="category-presets" id="categoryPresets" aria-label="Categorie rapide"></div>
            </div>
            <div class="category-list" id="categoryList"></div>
          </div>
        </section>

        <section class="menu-panel" aria-labelledby="itemsTitle">
          <div class="menu-panel__head">
            <div>
              <p class="menu-panel__eyebrow" id="selectedCategoryLabel">Piatti</p>
              <h2 class="menu-panel__title" id="itemsTitle">Seleziona una categoria</h2>
            </div>
            <button class="btn btn--primary" id="addItemBtn" type="button">+ Nuovo piatto</button>
          </div>
          <div class="menu-panel__body">
            <div class="items-list" id="itemsList"></div>
          </div>
        </section>
      </div>
    </section>
  </main>

  <div class="state" id="pageSpinner"><div class="spinner"></div></div>
  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/pwa.js"></script>
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script type="module" src="./admin-push.js"></script>
  <script type="module" src="menu.js"></script>
  <script>
    (() => {
      if (!window.ADMIN_EMBED || window.parent === window) return;
      const target = window.location.origin === 'null' ? '*' : window.location.origin;
      const sendSize = () => {
        window.parent.postMessage({
          type: 'admin-embedded-resize',
          panel: 'menu',
          height: Math.max(document.body.scrollHeight, document.documentElement.scrollHeight),
        }, target);
      };
      window.addEventListener('load', sendSize);
      if ('ResizeObserver' in window) {
        new ResizeObserver(sendSize).observe(document.body);
      } else {
        window.setInterval(sendSize, 1000);
      }
    })();
  </script>
</body>
</html>
