<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c8402a" />
  <title>Menu - Pannello gestionale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="../assets/js/admin-theme.js"></script>
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/panel.css" />

  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="../assets/icons/icon.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gestionale" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__brand">
        <img class="topbar__logo" id="venueLogo" alt="" hidden />
        <span class="topbar__brand-text">
          <span class="topbar__venue" id="venueName">-</span>
          <span class="topbar__role" id="userRole"></span>
        </span>
      </div>
      <input class="topbar__toggle" id="adminNavToggle" type="checkbox" aria-label="Apri menu" />
      <label class="topbar__menu" for="adminNavToggle" aria-hidden="true"><span></span><span></span><span></span></label>
      <nav class="topbar__nav" aria-label="Navigazione gestionale">
        <div class="topbar__nav-head">
          <div>
            <span class="topbar__nav-title"></span>
            <span class="topbar__nav-role"></span>
          </div>
          <label class="topbar__nav-close" for="adminNavToggle" role="button" tabindex="0" aria-label="Chiudi menu"><span></span></label>
        </div>
        <a class="topbar__link" href="dashboard.html">Dashboard</a>
        <a class="topbar__link" href="upcoming.html">Prenotazioni</a>
        <a class="topbar__link is-active" href="menu.html">Menu</a>
        <a class="topbar__link" href="stats.html">Statistiche</a>
        <a class="topbar__link" href="settings.html">Impostazioni</a>
        <button class="btn btn--ghost btn--sm" id="logoutBtn" type="button">Esci</button>
      </nav>
      <label class="topbar__scrim" for="adminNavToggle" aria-hidden="true"></label>
    </div>
  </header>

  <main class="page" id="page" hidden>
    <section class="section">
      <div class="section__head">
        <div>
          <h1 class="section__title">Menu</h1>
          <p class="muted" style="margin:6px 0 0">Collega il menu digitale mostrato nell'interfaccia pubblica.</p>
        </div>
      </div>

      <div class="card">
        <div class="grid-2">
          <div class="field">
            <label for="menuUrl">URL menu digitale</label>
            <input id="menuUrl" type="url" inputmode="url" placeholder="https://..." autocomplete="url" />
            <small class="muted">Inserisci il link al menu online o al PDF pubblico.</small>
          </div>
          <div class="field">
            <label>Anteprima</label>
            <div class="card" style="box-shadow:none;padding:16px">
              <strong id="menuPreviewTitle">Menu non collegato</strong>
              <p class="muted" id="menuPreviewText" style="margin:6px 0 14px">Quando salvi un link, i clienti potranno aprirlo dal widget pubblico.</p>
              <a class="btn btn--ghost btn--block" id="menuPreviewLink" href="#" target="_blank" rel="noopener" hidden>Apri menu</a>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px">
          <button class="btn btn--primary" id="saveMenu" type="button">Salva menu</button>
          <button class="btn btn--ghost" id="clearMenu" type="button">Rimuovi link</button>
        </div>
      </div>
    </section>
  </main>

  <div class="state" id="pageSpinner"><div class="spinner"></div></div>
  <script src="../assets/js/config.js"></script>
  <script type="module" src="menu.js"></script>
</body>
</html>
