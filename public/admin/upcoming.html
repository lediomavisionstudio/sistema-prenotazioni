<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c8402a" />
  <title>In arrivo — Pannello gestionale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/theme.css" />
  <link rel="stylesheet" href="../assets/css/panel.css" />

  <!-- PWA: gestionale installabile -->
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="../assets/icons/icon.svg" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gestionale" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__brand">
        <span class="topbar__venue" id="venueName">—</span>
        <span class="topbar__role" id="userRole"></span>
      </div>
      <nav class="topbar__nav" aria-label="Navigazione gestionale">
        <a class="topbar__link" href="dashboard.html"><i data-lucide="layout-dashboard" aria-hidden="true"></i><span>Dashboard</span></a>
        <a class="topbar__link is-active" href="upcoming.html"><i data-lucide="calendar-days" aria-hidden="true"></i><span>In arrivo</span></a>
        <a class="topbar__link" href="stats.html"><i data-lucide="bar-chart-3" aria-hidden="true"></i><span>Statistiche</span></a>
        <a class="topbar__link" href="settings.html"><i data-lucide="settings" aria-hidden="true"></i><span>Impostazioni</span></a>
        <button class="btn btn--ghost btn--sm topbar__logout" id="logoutBtn" type="button"><i data-lucide="log-out" aria-hidden="true"></i><span>Esci</span></button>
      </nav>
    </div>
  </header>

  <main class="page" id="page" hidden>
    <div class="section__head">
      <h1 class="section__title" style="font-size:1.3rem">Prossime prenotazioni</h1>
      <span class="pill" id="pendingCount"></span>
    </div>

    <div class="admin-toolbar admin-toolbar--compact">
      <label class="searchbox" for="upcomingSearch">
        <i data-lucide="search" aria-hidden="true"></i>
        <input id="upcomingSearch" type="search" placeholder="Cerca prenotazioni" autocomplete="off" aria-label="Cerca prenotazioni in arrivo" />
      </label>
    </div>

    <!-- Filtri stato -->
    <div class="tabs" id="filters" style="margin-bottom:18px">
      <button class="tab is-active" data-filter="attive"><span class="tab__name">Attive</span></button>
      <button class="tab" data-filter="in_attesa"><span class="tab__name">Da confermare</span></button>
      <button class="tab" data-filter="tutte"><span class="tab__name">Tutte</span></button>
    </div>

    <div id="upcoming"></div>
  </main>

  <div class="spinner" id="pageSpinner"></div>

  <script src="../assets/js/config.js"></script>
  <script src="../assets/js/pwa.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>window.addEventListener('DOMContentLoaded', function () { if (window.lucide) window.lucide.createIcons(); });</script>
  <script type="module" src="./upcoming.js"></script>
</body>
</html>
