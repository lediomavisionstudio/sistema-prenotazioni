<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Privacy Policy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --paper:#efe4c9; --surface:#fffdf6; --ink:#3a2b23; --ink-soft:#7a6a5d; --tomato:#c8402a; --line:#e3d6ba; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--paper); color: var(--ink);
      font-family: "Inter", system-ui, sans-serif; line-height: 1.55;
    }
    .wrap { max-width: 620px; margin: 0 auto; padding: 28px 18px 48px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 28px 24px; }
    h1 { font-family: "Bricolage Grotesque", sans-serif; font-size: 1.7rem; margin: 0 0 6px; }
    .back { display: inline-block; margin-top: 20px; color: var(--tomato); font-weight: 600; text-decoration: none; }
    .hint { color: var(--ink-soft); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Privacy Policy</h1>
      <!-- Placeholder: verrà sostituito dal template GDPR completo nello step
           dedicato "Privacy policy". -->
      <p class="hint">L'informativa sul trattamento dei dati personali sarà pubblicata qui.</p>
      <a class="back" href="index.html">← Torna alla prenotazione</a>
    </div>
  </div>
</body>
</html>
